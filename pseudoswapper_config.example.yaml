# pseudoswapper configuration template
# Copy this file to ~/.pseudoswapper_config.yaml and fill in your values.
# SECURITY: This file contains sensitive data (employee names, internal identifiers).
# Do not commit it to version control.

# Exact-match terms to always redact — highest priority.
# Use for company names, project names, internal system names, and domains.
company_terms:
  - Acme Corporation
  - Acme Corp
  - acme.com
  - Project Nightingale
  - internal-system-name

# Known employees — pre-registered before file scanning.
# Guarantees consistent tokenisation even when NLP misses a name.
# Supports: full_name, email, username (all optional except full_name).
#
# For large rosters, point to a CSV file instead of listing entries inline.
# The CSV must have a 'full_name' column; 'email' and 'username' are optional.
# Inline entries below are merged with the CSV (CSV wins on duplicate full_name).
#
# employees_csv: ~/company_employees.csv
employees:
  - full_name: John Doe
    email: john.doe@acme.com
    username: jdoe
  - full_name: Jane Smith
    email: j.smith@acme.com
    username: jsmith

# Structured mode settings (CSV, JSON, XLSX).
structured:
  # The column that uniquely and stably identifies each entity.
  # Override with --anchor on the CLI. Comment out to use auto-detection.
  anchor_field: employee_id

  # Additional columns to correlate to the anchor entity within each row.
  correlated_fields:
    - email
    - username
    - display_name
    - full_name

# Terms to exclude from NLP detection (prevents over-redaction of common words).
# exclude_terms:
#   - May
#   - Will

# Entity types to leave unreplaced (passthrough).
# Useful when certain technical values carry analytical value — e.g. keeping IP
# addresses visible in a security incident log while still redacting all names.
#
# Valid values: IP, DOMAIN, URL, PHONE, LOC
# Protected types (PERSON, EMAIL, COMPANY, ORG) are always tokenized and cannot
# be listed here. Per-run overrides are also available via --passthrough on the CLI.
#
# passthrough_types:
#   - IP
#   - DOMAIN

# Redact command profiles — named passthrough configurations for repeat workflows.
# Use with: pseudoswapper redact report.xlsx --profile incident_report
# All types including PERSON, EMAIL, COMPANY, ORG can be listed here.
# CREDIT_CARD is always redacted regardless of what is listed.
#
# redact_profiles:
#   incident_report:
#     passthrough:
#       - PERSON
#       - EMAIL
#       - COMPANY
#       - ORG
#   network_forensics:
#     passthrough:
#       - IP
#       - DOMAIN
#       - MAC_ADDRESS
